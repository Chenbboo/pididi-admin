<html><body>
<h1>正在修复文章...</h1>
<script src="https://js.cdn.aliyun.dcloud.net.cn/dev/uni-app/uniCloud/uniCloud-aliyun/uniCloud-web.js"></script>
<script>
uniCloud.init({
  provider: 'aliyun',
  spaceId: 'mp-1d2de47f-aa8c-41d0-8cbc-f88bb18923ad',
  clientSecret: 'MmBX5nRa3yBziaje1cKdlw==',
  endpoint: 'https://api.next.bspapp.com',
})
setTimeout(async () => {
  const db = uniCloud.database()
  const res = await db.collection('articles').get()
  const list = res.result.data
  let c = 0
  for (const a of list) {
    await db.collection('articles').doc(a._id).update({ status: 'published', views: Math.floor(Math.random()*3000)+500, collects: Math.floor(Math.random()*150)+20 })
    c++
  }
  document.body.innerHTML = '<h1 style="color:green">已修复 '+c+' 篇文章！</h1><p>小程序可以编译查看了</p>'
}, 2000)
</script>
</body></html>
